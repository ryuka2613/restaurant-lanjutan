<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant - Reserve a Table</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Reserve a Table</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="reserve.html">Reserve a Table</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="admin.html">Admin</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Book Your Experience Now</h2>
        <form>
            <label for="name">Your Name:</label>
            <input type="text" id="name" required>
            <label for="date">Reservation Date:</label>
            <input type="date" id="date" required>
            <label for="time">Reservation Time:</label>
            <input type="time" id="time" required>
            <label for="guests">Number of Guests:</label>
            <input type="number" id="guests" min="1" required>
            <button type="submit">Reserve</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 Restaurant Inc. All rights reserved.</p>
    </footer>
</body>
</html>
